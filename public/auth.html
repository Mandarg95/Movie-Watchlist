<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CineList — Sign In</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg:#0a0a0f;--bg2:#111118;--surface:#1e1e28;--surface2:#252530;
      --border:#2e2e3d;--gold:#e8c46a;--gold-dim:#b8963a;
      --text:#ede8e0;--muted:#7a7585;--dim:#4a4558;
      --green:#4ade80;--red:#fb7185;
      --font-h:'Playfair Display',serif;--font-b:'DM Sans',sans-serif;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{background:var(--bg);color:var(--text);font-family:var(--font-b);min-height:100vh;
      display:flex;align-items:center;justify-content:center;padding:24px;overflow:hidden;}
    .blob{position:fixed;border-radius:50%;filter:blur(80px);opacity:.12;pointer-events:none}
    .b1{width:500px;height:500px;background:#e8c46a;top:-100px;left:-100px}
    .b2{width:400px;height:400px;background:#7c3aed;bottom:-80px;right:-80px}
    .b3{width:300px;height:300px;background:#0ea5e9;top:50%;left:50%;transform:translate(-50%,-50%)}
    .card{background:var(--bg2);border:1px solid var(--border);border-radius:24px;padding:44px 40px;
      width:100%;max-width:420px;position:relative;z-index:1;box-shadow:0 40px 80px rgba(0,0,0,.6);
      animation:cardIn .5s cubic-bezier(.34,1.3,.64,1)}
    @keyframes cardIn{from{opacity:0;transform:translateY(30px) scale(.96)}to{opacity:1;transform:translateY(0) scale(1)}}
    .logo{text-align:center;margin-bottom:32px}
    .logo-icon{font-size:32px;color:var(--gold);display:block;margin-bottom:8px;animation:spin 12s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
    .logo-text{font-family:var(--font-h);font-size:32px;font-weight:900;
      background:linear-gradient(135deg,var(--gold),#fff 60%,var(--gold-dim));
      -webkit-background-clip:text;-webkit-text-fill-color:transparent}
    .logo-sub{font-size:13px;color:var(--muted);margin-top:6px}
    .tabs{display:flex;background:var(--surface);border:1px solid var(--border);
      border-radius:12px;padding:4px;margin-bottom:28px}
    .tab{flex:1;background:none;border:none;cursor:pointer;font-family:var(--font-b);
      font-size:14px;font-weight:500;color:var(--muted);padding:9px;border-radius:9px;transition:all .2s}
    .tab.active{background:var(--surface2);color:var(--gold);box-shadow:0 2px 8px rgba(0,0,0,.4)}
    .panel{display:none}
    .panel.active{display:block;animation:fadeIn .25s ease}
    @keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
    .field{margin-bottom:16px}
    .field label{display:block;font-size:12px;font-weight:600;text-transform:uppercase;
      letter-spacing:.8px;color:var(--muted);margin-bottom:7px}
    .field input{width:100%;background:var(--surface);border:1px solid var(--border);
      border-radius:10px;color:var(--text);font-family:var(--font-b);font-size:15px;
      padding:12px 14px;outline:none;transition:border-color .2s,box-shadow .2s}
    .field input:focus{border-color:var(--gold-dim);box-shadow:0 0 0 3px rgba(232,196,106,.1)}
    .field input::placeholder{color:var(--dim)}
    .btn-submit{width:100%;margin-top:8px;background:var(--gold);color:#0a0a0f;border:none;
      cursor:pointer;font-family:var(--font-b);font-size:15px;font-weight:700;padding:13px;
      border-radius:12px;transition:background .2s,transform .15s;letter-spacing:.3px}
    .btn-submit:hover{background:#f5d484;transform:translateY(-1px)}
    .btn-submit:disabled{opacity:.6;cursor:not-allowed;transform:none}
    .msg{font-size:13px;font-weight:500;padding:10px 14px;border-radius:9px;margin-bottom:16px;display:none}
    .msg.error{background:rgba(251,113,133,.12);color:var(--red);border:1px solid rgba(251,113,133,.3);display:block}
    .msg.success{background:rgba(74,222,128,.12);color:var(--green);border:1px solid rgba(74,222,128,.3);display:block}
    .strength-bar{height:3px;border-radius:2px;background:var(--border);margin-top:8px;overflow:hidden}
    .strength-fill{height:100%;border-radius:2px;transition:width .3s,background .3s;width:0%}
    .strength-label{font-size:11px;color:var(--muted);margin-top:4px;text-align:right}
    .footer-note{text-align:center;margin-top:24px;font-size:12px;color:var(--dim)}
  </style>
</head>
<body>
<div class="blob b1"></div><div class="blob b2"></div><div class="blob b3"></div>
<div class="card">
  <div class="logo">
    <span class="logo-icon">◈</span>
    <div class="logo-text">CineList</div>
    <div class="logo-sub">Your personal movie watchlist</div>
  </div>
  <div class="tabs">
    <button class="tab active" id="tabLogin"    onclick="showTab('login')">Sign In</button>
    <button class="tab"        id="tabRegister" onclick="showTab('register')">Create Account</button>
  </div>
  <!-- Login -->
  <div class="panel active" id="panelLogin">
    <div class="msg" id="loginMsg"></div>
    <div class="field"><label>Email</label>
      <input type="email" id="loginEmail" placeholder="you@example.com" autocomplete="email"/></div>
    <div class="field"><label>Password</label>
      <input type="password" id="loginPassword" placeholder="••••••••" autocomplete="current-password"/></div>
    <button class="btn-submit" id="loginBtn" onclick="doLogin()">Sign In</button>
  </div>
  <!-- Register -->
  <div class="panel" id="panelRegister">
    <div class="msg" id="registerMsg"></div>
    <div class="field"><label>Username</label>
      <input type="text" id="regUsername" placeholder="cinefan99" autocomplete="username"/></div>
    <div class="field"><label>Email</label>
      <input type="email" id="regEmail" placeholder="you@example.com" autocomplete="email"/></div>
    <div class="field"><label>Password</label>
      <input type="password" id="regPassword" placeholder="Min. 6 characters"
        autocomplete="new-password" oninput="checkStrength(this.value)"/>
      <div class="strength-bar"><div class="strength-fill" id="strengthFill"></div></div>
      <div class="strength-label" id="strengthLabel"></div>
    </div>
    <button class="btn-submit" id="registerBtn" onclick="doRegister()">Create Account</button>
  </div>
  <div class="footer-note">Your watchlist, your movies 🎬</div>
</div>
<script>
  if (localStorage.getItem("cl_token")) window.location.href = "/";
  function showTab(tab) {
    ["login","register"].forEach(t => {
      document.getElementById("panel"+t.charAt(0).toUpperCase()+t.slice(1)).classList.toggle("active", t===tab);
      document.getElementById("tab"+t.charAt(0).toUpperCase()+t.slice(1)).classList.toggle("active", t===tab);
    });
    document.getElementById("loginMsg").className="msg";
    document.getElementById("registerMsg").className="msg";
  }
  function showMsg(id,text,type){const e=document.getElementById(id);e.textContent=text;e.className="msg "+type;}
  function setLoading(id,on){const b=document.getElementById(id);b.disabled=on;
    b.textContent=on?"Please wait…":(id==="loginBtn"?"Sign In":"Create Account");}
  async function doLogin(){
    const email=document.getElementById("loginEmail").value.trim();
    const password=document.getElementById("loginPassword").value;
    if(!email||!password)return showMsg("loginMsg","Please fill in all fields.","error");
    setLoading("loginBtn",true);
    try{
      const res=await fetch("/api/auth/login",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({email,password})});
      const data=await res.json();
      if(!res.ok)return showMsg("loginMsg",data.error||"Login failed.","error");
      localStorage.setItem("cl_token",data.token);
      localStorage.setItem("cl_username",data.username);
      localStorage.setItem("cl_email",data.email);
      window.location.href="/";
    }catch{showMsg("loginMsg","Server error. Is the server running?","error");}
    finally{setLoading("loginBtn",false);}
  }
  async function doRegister(){
    const username=document.getElementById("regUsername").value.trim();
    const email=document.getElementById("regEmail").value.trim();
    const password=document.getElementById("regPassword").value;
    if(!username||!email||!password)return showMsg("registerMsg","Please fill in all fields.","error");
    if(password.length<6)return showMsg("registerMsg","Password must be at least 6 characters.","error");
    setLoading("registerBtn",true);
    try{
      const res=await fetch("/api/auth/register",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({username,email,password})});
      const data=await res.json();
      if(!res.ok)return showMsg("registerMsg",data.error||"Registration failed.","error");
      localStorage.setItem("cl_token",data.token);
      localStorage.setItem("cl_username",data.username);
      localStorage.setItem("cl_email",data.email);
      showMsg("registerMsg","Account created! Redirecting…","success");
      setTimeout(()=>window.location.href="/",1000);
    }catch{showMsg("registerMsg","Server error.","error");}
    finally{setLoading("registerBtn",false);}
  }
  function checkStrength(val){
    const fill=document.getElementById("strengthFill");
    const label=document.getElementById("strengthLabel");
    let s=0;
    if(val.length>=6)s++;if(val.length>=10)s++;
    if(/[A-Z]/.test(val))s++;if(/[0-9]/.test(val))s++;if(/[^A-Za-z0-9]/.test(val))s++;
    const lvls=[{w:"0%",bg:"transparent",t:""},{w:"25%",bg:"#fb7185",t:"Weak"},
      {w:"50%",bg:"#fbbf24",t:"Fair"},{w:"75%",bg:"#60a5fa",t:"Good"},{w:"100%",bg:"#4ade80",t:"Strong"}];
    const l=lvls[Math.min(s,4)];
    fill.style.width=l.w;fill.style.background=l.bg;label.textContent=l.t;label.style.color=l.bg;
  }
  document.addEventListener("keydown",e=>{
    if(e.key!=="Enter")return;
    if(document.getElementById("panelLogin").classList.contains("active"))doLogin();
    else doRegister();
  });
</script>
</body>
</html>
